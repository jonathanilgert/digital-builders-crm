name: Deploy CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: digitalbuilders-crm-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            BASE=/opt/digitalbuilders-crm
            REPO=https://github.com/jonathanilgert/digital-builders-crm.git
            SHA=${{ github.sha }}
            REL="$BASE/releases/$(date +%Y%m%d-%H%M%S)-${SHA:0:7}"

            mkdir -p "$BASE/releases"
            git clone "$REPO" "$REL"
            cd "$REL"
            git checkout -q "$SHA"

            npm ci --omit=dev
            cd client
            npm ci
            npm run build
            cd ..

            rm -f server/data.json
            ln -s "$BASE/shared/data.json" server/data.json
            ln -sfn "$REL" "$BASE/current"
            pm2 startOrReload "$BASE/shared/ecosystem.config.js"
